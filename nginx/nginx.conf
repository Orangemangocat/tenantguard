events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream services ──────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:3000;
    }

    # ── Shared proxy headers macro (avoids repetition) ────────────────────
    # NOTE: nginx does not support map-based macros in location blocks without
    # a separate include, so we repeat headers inline. This is standard practice.

    # ── www → non-www canonical redirect ──────────────────────────────────
    # NextAuth CSRF cookies use __Host- prefix which is bound to the exact
    # origin. If users hit www.tenantguard.net the CSRF token won't match
    # the NEXTAUTH_URL (tenantguard.net), causing the "Error" page on login.
    server {
        listen 80;
        listen 443 ssl;
        server_name www.tenantguard.net;

        ssl_certificate     /etc/nginx/ssl/ssl-cert-snakeoil.pem;
        ssl_certificate_key /etc/nginx/ssl/ssl-cert-snakeoil.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 301 https://tenantguard.net$request_uri;
    }

    # ── Main production server ─────────────────────────────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name tenantguard.net;

        ssl_certificate     /etc/nginx/ssl/ssl-cert-snakeoil.pem;
        ssl_certificate_key /etc/nginx/ssl/ssl-cert-snakeoil.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        # ── NextAuth.js routes → Next.js frontend ─────────────────────────
        # Only the specific NextAuth paths: signin, signout, session, csrf,
        # callback/*, providers, _log, error.
        # Everything else under /api/auth/ goes to Django.
        location ~ ^/api/auth/(signin|signout|session|csrf|callback|providers|_log|error) {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Next.js API routes (server-side, NOT Django) ──────────────────
        location /api/analyze-notice {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
            client_max_body_size 50M;
        }

        location /api/chat-help {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /api/save-lead {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Django API ────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Django Admin ──────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Staff panel ───────────────────────────────────────────────────
        location /staff/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Django Summernote editor ──────────────────────────────────────
        location /summernote/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        # ── Django static files ───────────────────────────────────────────
        location /static/ {
            proxy_pass http://backend;
        }

        # ── Presentation: Master index page ──────────────────────────────
        # Served by Python HTTP server on host port 8082
        # proxy_redirect off prevents the Python server's own redirects from
        # leaking back to the client with wrong Location headers.
        location = /index-page {
            return 301 /index-page/;
        }
        location /index-page/ {
            proxy_pass        http://172.17.0.1:8082/;
            proxy_set_header  Host        $host;
            proxy_set_header  X-Real-IP   $remote_addr;
            proxy_redirect    off;
        }

        # ── Presentation: CaseLink Crawler overview ───────────────────────
        # Served by Python HTTP server on host port 8081
        # The exact-match redirect ensures /crawler (no slash) → /crawler/
        # so the Python server always receives a valid non-empty path.
        location = /crawler {
            return 301 /crawler/;
        }
        location /crawler/ {
            proxy_pass        http://172.17.0.1:8081/;
            proxy_set_header  Host        $host;
            proxy_set_header  X-Real-IP   $remote_addr;
            proxy_redirect    off;
        }

        # ── Next.js frontend (everything else) ───────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
            # WebSocket support for Next.js HMR (harmless in prod)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Staging / dev server ───────────────────────────────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name dev.tenantguard.net staging.tenantguard.net;

        ssl_certificate     /etc/nginx/ssl/ssl-cert-snakeoil.pem;
        ssl_certificate_key /etc/nginx/ssl/ssl-cert-snakeoil.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        location ~ ^/api/auth/(signin|signout|session|csrf|callback|providers|_log|error) {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /api/analyze-notice {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
            client_max_body_size 50M;
        }

        location /api/chat-help {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /api/save-lead {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /staff/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /summernote/ {
            proxy_pass http://backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        }

        location /static/ {
            proxy_pass http://backend;
        }

        location = /index-page {
            return 301 /index-page/;
        }
        location /index-page/ {
            proxy_pass        http://172.17.0.1:8082/;
            proxy_set_header  Host        $host;
            proxy_set_header  X-Real-IP   $remote_addr;
            proxy_redirect    off;
        }

        location = /crawler {
            return 301 /crawler/;
        }
        location /crawler/ {
            proxy_pass        http://172.17.0.1:8081/;
            proxy_set_header  Host        $host;
            proxy_set_header  X-Real-IP   $remote_addr;
            proxy_redirect    off;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
