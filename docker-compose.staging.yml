# docker-compose.staging.yml
# Staging override: builds images locally, uses local PostgreSQL instead of Cloud SQL Proxy
# Usage: docker compose -f docker-compose.staging.yml up --build -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    volumes:
      - media_data:/app/media
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - tenantguard-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://staging.tenantguard.net/api/
    restart: unless-stopped
    env_file: ./frontend/.env.local
    expose:
      - "3000"
    networks:
      - tenantguard-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tenantguard-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenantguard_staging
      POSTGRES_USER: tenantguard
      POSTGRES_PASSWORD: TG_staging_2026!
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - tenantguard-net

volumes:
  pgdata:
  media_data:

networks:
  tenantguard-net:
    driver: bridge
