{% extends "admin/change_form.html" %}
{% load i18n admin_urls %}

{% block object-tools-items %}
  {% if original and original.status == 'draft' %}
  <li>
    <a
      href="{% url 'admin:blog_post_publish' original.pk %}"
      class="addlink"
      style="background-color: #28a745;"
      onclick="return confirm('Publish \'{{ original.title }}\'?')"
    >
      {% trans "Publish Now" %}
    </a>
  </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
