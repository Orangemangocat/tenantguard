name: Build & Deploy

on:
  push:
    branches:
      - main          # → staging
    tags:
      - 'v*'          # → production

env:
  ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY_URL }}   # e.g. us-central1-docker.pkg.dev/my-project/tenantguard

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/tenantguard-backend:${{ steps.tag.outputs.tag }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/tenantguard-backend:latest \
            ./backend
          docker push ${{ env.ARTIFACT_REGISTRY }}/tenantguard-backend:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/tenantguard-backend:latest

      - name: Build & push frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/tenantguard-frontend:${{ steps.tag.outputs.tag }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/tenantguard-frontend:latest \
            ./frontend
          docker push ${{ env.ARTIFACT_REGISTRY }}/tenantguard-frontend:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/tenantguard-frontend:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG,ARTIFACT_REGISTRY,CLOUD_SQL_CONN,GCS_SECRETS_BUCKET
          script: |
            set -e
            cd /opt/tenantguard
            git pull origin main
            export DEPLOY_ENV=staging
            export GCS_SECRETS_BUCKET="$GCS_SECRETS_BUCKET"
            bash scripts/fetch-env.sh
            export ARTIFACT_REGISTRY="$ARTIFACT_REGISTRY"
            export IMAGE_TAG="$IMAGE_TAG"
            export CLOUD_SQL_INSTANCE_CONNECTION_NAME="$CLOUD_SQL_CONN"
            docker compose pull backend frontend
            docker compose run --rm backend python manage.py migrate --noinput
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ARTIFACT_REGISTRY: ${{ env.ARTIFACT_REGISTRY }}
          CLOUD_SQL_CONN: ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          GCS_SECRETS_BUCKET: ${{ vars.GCS_SECRETS_BUCKET }}

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: IMAGE_TAG,ARTIFACT_REGISTRY,CLOUD_SQL_CONN,GIT_TAG,GCS_SECRETS_BUCKET
          script: |
            set -e
            cd /opt/tenantguard
            git fetch --tags
            git checkout "$GIT_TAG"
            export DEPLOY_ENV=prod
            export GCS_SECRETS_BUCKET="$GCS_SECRETS_BUCKET"
            bash scripts/fetch-env.sh
            export ARTIFACT_REGISTRY="$ARTIFACT_REGISTRY"
            export IMAGE_TAG="$IMAGE_TAG"
            export CLOUD_SQL_INSTANCE_CONNECTION_NAME="$CLOUD_SQL_CONN"
            docker compose pull backend frontend
            docker compose run --rm backend python manage.py migrate --noinput
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ARTIFACT_REGISTRY: ${{ env.ARTIFACT_REGISTRY }}
          CLOUD_SQL_CONN: ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          GIT_TAG: ${{ github.ref_name }}
          GCS_SECRETS_BUCKET: ${{ vars.GCS_SECRETS_BUCKET }}
